openapi: "3.0.3"
info:
  title: Swagger GreenIT - Open API 3.0 - Referential
  description: This is an Inventory Server based on the OpenAPI 3.0 specification.
  version: "1.0.0"

tags:
  - name: workspace referential import export
    description: All endpoints for workspace referential import and export

paths:
  /organizations/{organization}/workspaces/{workspace}/referential-workspace/{type}/csv:
    parameters:
      - $ref: "#/components/parameters/organizationPathParam"
      - $ref: "#/components/parameters/workspacePathParam"

      - name: type
        in: path
        required: true
        description: Referential type (itemImpact, itemType, matchingItem)
        schema:
          type: string
          enum: [ itemImpact, itemType, matchingItem ]

    post:
      tags:
        - workspace referential import export
      summary: Import workspace referential from CSV
      description: |
        Import workspace-specific referential data from a CSV file.

        Rules:
        - If item exists → UPDATE
        - If item does not exist → CREATE
        - If item missing in file → DELETE
        - If file is empty → DELETE ALL workspace data
        - If validation errors exist → NO DATA is updated
      operationId: importWorkspaceReferentialCSV
      x-custom-role: "hasRole('ROLE_SUPER_ADMINISTRATOR') or hasRole('ROLE_WORKSPACE_ADMINISTRATOR')"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: CSV import report
          content:
            application/hal+json:
              schema:
                $ref: "#/components/schemas/ImportReportRest"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Forbidden - user is not workspace admin
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /organizations/{organization}/workspaces/{workspace}/referential-workspace/csv:
    parameters:
      - $ref: "#/components/parameters/organizationPathParam"
      - $ref: "#/components/parameters/workspacePathParam"

    get:
      tags:
        - workspace referential import export
      summary: Export workspace referential as CSV
      description: |
        Export workspace-specific referential data.
        If no data exists, a CSV template (headers only) is returned.
      operationId: exportWorkspaceReferentialZip
      x-custom-role: "hasRole('ROLE_SUPER_ADMINISTRATOR') or hasRole('ROLE_WORKSPACE_ADMINISTRATOR')"
      responses:
        "200":
          description: CSV file
          content:
            application/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Forbidden - user is not workspace admin
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
