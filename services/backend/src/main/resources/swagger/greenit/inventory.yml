openapi: "3.0.3"
info:
  title: Swagger GreenIT - Open API 3.0 - Inventory
  description: This is a Inventory Server based on the OpenAPI 3.0 specification.
  version: '1.0.0'

tags:
  - name: inventory
    description: All endpoint for an organization's inventory
  - name: inventory-loading
    description: All endpoint for the organization's inventory loading
  - name: inventory-evaluation
    description: All endpoint for the organization's inventory evaluation

paths:
  /organizations/{organization}/workspaces/{workspace}/inventories:
    parameters:
      - $ref: '#/components/parameters/organizationPathParam'
      - $ref: '#/components/parameters/workspacePathParam'
    get:
      tags:
        - inventory
      summary: Get an organization's inventory list
      operationId: getInventories
      x-custom-role: "hasRole('INVENTORY_READ')"
      parameters:
        - $ref: '#/components/parameters/inventoryIdQueryParam'
      responses:
        '200':
          description: Return the organization's inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryRest"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Delete all inventory for an organization
      operationId: deleteInventories
      x-custom-role: "hasRole('INVENTORY_WRITE')"
      tags:
        - inventory
      responses:
        '204':
          description: All organization inventories have been deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a new inventory
      operationId: createInventory
      x-custom-role: "hasRole('INVENTORY_WRITE')"
      requestBody:
        description: Mandatory inventory details to create.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryCreateRest"
      tags:
        - inventory
      responses:
        '201':
          description: Inventory has been created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRest"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Inventory already exists.
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/RestError"
        '500':
          $ref: "#/components/responses/InternalServerError"
    put:
      summary: Update an inventory
      operationId: updateInventory
      x-custom-role: "hasRole('INVENTORY_READ')"
      requestBody:
        description: Mandatory inventory details to update.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryUpdateRest"
      tags:
        - inventory
      responses:
        '200':
          description: Inventory has been updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryRest"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: "#/components/responses/InternalServerError"

  /organizations/{organization}/workspaces/{workspace}/inventories/{inventoryId}:
    parameters:
      - $ref: '#/components/parameters/organizationPathParam'
      - $ref: '#/components/parameters/workspacePathParam'
      - $ref: '#/components/parameters/inventoryIdPathParam'
    delete:
      summary: Delete an inventory
      operationId: deleteInventory
      x-custom-role: "hasRole('INVENTORY_WRITE')"
      tags:
        - inventory
      responses:
        '204':
          description: OK
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: "#/components/responses/InternalServerError"

  /organizations/{organization}/workspaces/{workspace}/inventories/{inventoryId}/sources:
    parameters:
      - $ref: '#/components/parameters/organizationPathParam'
      - $ref: '#/components/parameters/workspacePathParam'
      - $ref: '#/components/parameters/inventoryIdPathParam'
    get:
      tags:
        - inventory
      summary: Get a list for sources used in inventory
      operationId: getInventoriesSources
      x-custom-role: "hasRole('INVENTORY_READ')"
      responses:
        '200':
          description: Return the list for sources used in inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: "#/components/responses/InternalServerError"

  /organizations/{organization}/workspaces/{workspace}/inventories/workspace-referential-csv:
    parameters:
      - $ref: "#/components/parameters/organizationPathParam"
      - $ref: "#/components/parameters/workspacePathParam"

    get:
      tags:
        - inventory
      summary: Export workspace referential as CSV
      description: |
        Export workspace-specific referential data.
        If no data exists, a CSV template (headers only) is returned.
      operationId: exportInventoryWorkspaceReferentialZip
      x-custom-role: "hasRole('INVENTORY_READ')"
      responses:
        "200":
          description: CSV file
          content:
            application/csv:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: Forbidden - user is not workspace admin
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"


