email.body=<html> <head> <style> .notification-card '{'font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;line-height: 1.6;color: #333333;max-width: 600px;margin: 20px auto;border: 1px solid #e0e0e0; border-radius: 8px;padding: 24px;background-color: #ffffff;'}' .alert-header '{' color: #d93025; font-weight: bold;font-size: 18px;margin-bottom: 16px; '}'.action-link '{' display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #0056b3;color: #ffffff !important;text-decoration: none; border-radius: 4px; font-weight: 500;'}' .footer '{' margin-top: 25px;padding-top: 15px;border-top: 1px solid #eeeeee; font-size: 13px;color: #666666;'}' .support-email '{'color: #0056b3;text-decoration: none;'}' </style> </head> <body>  <div class="notification-card">     <div class="alert-header">Expiration Notice</div>          <p>Les données associées à l'inventaire <strong>{0}</strong> expireront le <strong>{1}</strong>.</p>          <p> Si la durée de conservation des données n'est pas renouvelée, elles seront supprimées Ce mécanisme a été mis en place pour éviter le stockage de données inutiles et ainsi réduire l'impact de G4IT.</p>          <p>Vous pouvez exporter vos données ou cliquer sur le lien suivant pour renouveler le délai de conservation des données fixé à <strong>{2} jours </strong> :</p>          <a href="" class="action-link">Renew Data Retention</a>      <div class="footer">         <p>Ce message a été généré automatiquement. Si vous souhaitez rentrer en contact avec l'équipe de support, envoyez un email à l'adresse suivante :          <a href="mailto:support.g4it@soprasteria.com" class="support-email">support.g4it@soprasteria.com</a></p>     </div> </div>  </body> </html>
