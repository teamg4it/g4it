<div class="table-container mb-5">
    <app-digital-service-table
        titleText="devices"
        accessibilityText="device"
        addButtonId="add-terminals"
        translationPrefix="digital-services-terminals"
        [headerFields]="headerFields"
        [data]="terminals()"
        [forceWrite]="embedded()"
        [hideAddButton]="embedded()"
        [hideActions]="false"
        (sidebar)="changeSidebar($event)"
        (resetItem)="resetTerminal()"
        (setItem)="setItem($event)"
        (deleteItem)="deleteItem($event)"
        [paginator]="!embedded()"
    ></app-digital-service-table>
</div>
@if (sidebarVisible) {
    <p-sidebar
        *ngIf="!embedded() && sidebarVisible"
        [(visible)]="sidebarVisible"
        position="right"
        styleClass="p-sidebar-lg"
        (onHide)="childSidePanel.close()"
        ariaCloseLabel="Close"
    >
        <app-digital-services-terminals-side-panel
            #childSidePanel
            [terminal]="terminal"
            [terminalData]="terminals()"
            [sidebarVisible]="sidebarVisible"
            (sidebarVisibleChange)="sidebarVisible = $event"
            (updateTerminals)="updateTerminals($event)"
            (deleteTerminals)="deleteItem($event)"
        >
        </app-digital-services-terminals-side-panel>
    </p-sidebar>
}
