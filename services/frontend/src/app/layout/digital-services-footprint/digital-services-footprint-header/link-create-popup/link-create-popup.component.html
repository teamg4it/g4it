<div class="link-copy-popup">
    <p-dialog
        [modal]="true"
        [(visible)]="displayPopup"
        [breakpoints]="{ '1199px': '75vw', '575px': '90vw' }"
        [style]="{ width: '30vw' }"
        [draggable]="false"
        [dismissableMask]="true"
        (onHide)="closePopup()"
        id="link-copy"
    >
        <ng-template pTemplate="header">
            <h3 class="font-semibold ml-0 text-2xl">
                {{ "digital-services.link-created" | translate }}
            </h3>
        </ng-template>

        <div class="copy-container grid">
            @if (!loading) {
                <input
                    class="col label-input-div-medium input-width inline-block p-2 mx-1"
                    pInputText
                    [value]="sharedLink()"
                    readonly
                    [placeholder]="'administration.organization.new' | translate"
                    name="copyLink"
                    ngDefaultControl
                    id="copy-link-input"
                    #linkInput
                    (focus)="moveCaretToStart(linkInput)"
                />
            }
        </div>
        <ng-template pTemplate="footer">
            <div
                class="block text-left sm:text-right sm:flex align-items-center justify-content-between"
            >
                <div class="flex justify-content-start ml-auto">
                    @if (!loading) {
                        <p-button
                            [attr.aria-label]="
                                'digital-services.save-settings' | translate
                            "
                            styleClass="uppercase mr-0"
                            (onClick)="copyUrl()"
                            [disabled]="isLinkCopied"
                            [label]="
                                (isLinkCopied
                                    ? 'digital-services.linkCopied'
                                    : 'digital-services.copyLink'
                                ) | translate
                            "
                        >
                        </p-button>
                    } @else {
                        <p-progressSpinner
                            styleClass="mr-2 w-4rem h-4rem"
                            strokeWidth="4"
                        ></p-progressSpinner>
                    }
                </div>
            </div>
        </ng-template>
    </p-dialog>
</div>
